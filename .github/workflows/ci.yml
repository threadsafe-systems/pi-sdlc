name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test + biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: config schema release signal
        run: node skills/sdlc/scripts/check-schema-break.mjs --event "$GITHUB_EVENT_PATH" --repo-root "$GITHUB_WORKSPACE"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: lifecycle contract
        run: node skills/sdlc/scripts/check-lifecycle.mjs --event "$GITHUB_EVENT_PATH" --repo-root "$GITHUB_WORKSPACE"
      - run: npm test
      # Verify-only: biome check exits non-zero on any format or lint
      # violation, failing the job. CI never auto-fixes.
      - run: npm run lint
